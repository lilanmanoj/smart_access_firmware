; PlatformIO Project Configuration File
;
; Target : ESP32-S3-DevKitC-1 (N8, 8 MB flash, no PSRAM)
; Display: GMT024-08-SPI8P  2.4" 240x320 TFT, 8-pin SPI, no touch.
;          Sold as ILI9341 but the controller is an ST7789 -- see the driver
;          note below. All four rotations work; UI runs landscape (rotation 1).
; GUI    : LVGL 8.3 on top of TFT_eSPI
;
; Envs:
;   esp32-s3-devkitc-1 -> the real firmware   (default)
;       pio run -t upload -t monitor
;   tft-test           -> bare TFT_eSPI rotation/colour probe, no LVGL
;       pio run -e tft-test -t upload -t monitor

[platformio]
; Without this, a bare `pio run -t upload` flashes EVERY env in turn and the
; test sketch ends up overwriting the firmware.
default_envs = esp32-s3-devkitc-1

[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Uploading over the DevKitC-1's native "USB" port (USB-Serial-JTAG,
; VID:PID 303a:1001 -> /dev/ttyACM0), not the CP2102 "UART" port.
;   - no upload_speed: the USB-JTAG bridge is not a real UART, and forcing
;     921600 is what produces "pySerial: Write timeout".
;   - dtr/rts must stay deasserted or opening the port resets the chip
;     and drops the CDC device mid-transfer.
upload_protocol = esptool
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_dtr = 0
monitor_rts = 0

; No PSRAM flags here: the `esp32-s3-devkitc-1` board is the N8 variant
; (8 MB flash, no PSRAM). Declaring BOARD_HAS_PSRAM / memory_type = qio_opi
; makes the boot ROM probe for an octal PSRAM chip that isn't there:
;   E (95) psram: PSRAM ID read error: 0x00ffffff
; If your module is actually an N16R8, use board = esp32s3box or add:
;   board_build.arduino.memory_type = qio_opi
;   board_upload.flash_size = 16MB
;   -DBOARD_HAS_PSRAM
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

	; ---------- TFT_eSPI : GMT024-08-SPI8P (ILI9341) ----------
	-DUSER_SETUP_LOADED=1

	; This panel is NOT an ILI9341 despite the listing. Driven with the ILI9341
	; init sequence it showed, from a raw TFT_eSPI test frame:
	;   - TFT_MAGENTA (0xF81F) rendering as green (0x1FF8) -> bytes swapped
	;   - text rotated 90 deg at rotation 0
	;   - corner markers landing on the wrong corners
	; All three are the ST7789 signature. Revert to -DILI9341_DRIVER=1 if a
	; future panel really is one.
	-DST7789_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_RGB_ORDER=TFT_BGR
	-DTFT_INVERSION_ON=1

	; --- wiring (ESP32-S3-DevKitC-1) ---
	; The 8-pin module has no SDO/MISO pad, but -1 makes the Arduino HAL look
	; for HSPI's default MISO, which the S3 doesn't have:
	;   [E][esp32-hal-spi.c:215] spiAttachMISO(): HSPI Does not have default
	;   pins on ESP32S3!
	; Point it at a spare GPIO instead; nothing is wired to it.
	-DTFT_MISO=13
	-DTFT_MOSI=11
	-DTFT_SCLK=12
	-DTFT_CS=10
	-DTFT_DC=14
	-DTFT_RST=21
	-DTFT_BL=47
	-DTFT_BACKLIGHT_ON=HIGH

	-DLOAD_GLCD=1

	; USE_HSPI_PORT is REQUIRED on the ESP32-S3. With no port defined,
	; TFT_eSPI_ESP32_S3.c binds `SPIClass& spi = SPI` (the Arduino global,
	; SPIClass SPI(FSPI)) whose spi_t* is never started -> null deref in
	; begin_tft_write():  Guru Meditation StoreProhibited, EXCVADDR 0x10.
	; Naming a port makes the library construct its own SPIClass and begin() it.
	; HSPI (= SPI3) also avoids fighting the global SPI object over FSPI.
	; SPI3 routes through the GPIO matrix, so GPIO 10-14 are fine.
	-DUSE_HSPI_PORT=1

	; Start slow; 40 MHz works on short wires, dupont jumpers often do not.
	-DSPI_FREQUENCY=20000000
	-DSPI_READ_FREQUENCY=10000000

; ------------------------------------------------------------------ firmware
[env:esp32-s3-devkitc-1]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_protocol = ${common.upload_protocol}
upload_port = ${common.upload_port}
monitor_port = ${common.monitor_port}
monitor_dtr = ${common.monitor_dtr}
monitor_rts = ${common.monitor_rts}

lib_deps =
	lvgl/lvgl@^8.3.11
	bodmer/TFT_eSPI@^2.5.43

build_src_filter = +<*> -<tft_test.cpp>

build_flags =
	${common.build_flags}
	-DLV_CONF_INCLUDE_SIMPLE
	-I include
